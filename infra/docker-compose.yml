services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: saasplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [control-net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [control-net]

  traefik:
    image: traefik:v3
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
      - letsencrypt:/letsencrypt
    networks: [assistants-net]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: .env
    ports:
      - "4000:4000"
    depends_on: [postgres, redis]
    networks: [control-net]

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [postgres, redis]
    networks: [control-net, assistants-net]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on: [api]

networks:
  control-net:
    internal: true
  assistants-net:
    name: assistants-net

volumes:
  pgdata:
  letsencrypt:
